[sampler_params]


    # options of the sampling
    disable_chex = false # quick test parameters 

    # sampling parameters
    nside = 32
    lmax = 64
    nstokes = 2
    lmin = 2
    n_iter = 3 # Number of iterations for Python estimation of alms
    n_components = 2 # Number of components to sample, usually 3 (CMB + 2 foregrounds components)
    pos_special_freqs = [] # position of the special frequencies in the frequency array, if not provided, the first and last frequencies will be considered as special frequencies
    indexes_free_Bf = false # Bf indexes that will be sampled
    indices_fixed_Bf = false

    # seed for the begining of the chain 
    seed = 50


    # Metropolis-Hastings-within-Gibbs parameters
    step_size_Bf_1 = 1e-1 # Provide step-size for the first column of Bf ; it can also be provided as a list 
    step_size_Bf_2 = 1e-1 #5e-5 # Provide step-size for the second column of Bf ; it can also be provided as a list 

    step_size_Sf_1 = 1e-1 # Provide step-size for the first column of Bf ; it can also be provided as a list 
    step_size_Sf_2 = 1e-1 #5e-5 # Provide step-size for the second column of Bf ; it can also be provided as a list 

    # instrument parameters
    instrument_name = 'SO_SAT' #example: 'LiteBIRD' or 'SO_SAT' # Either provide instrument name, then freq_inverse_noise and frequency_array will be taken from fgbuster,
    # or provide expcitely freq_inverse_noise and frequency_array with instrument_name="customized_instrument"
    # frequency_array = [90]
    # depth_p = [4]


    # iterations 
    number_iterations_sampling = 208 # Maximum number of iterations for the sampling
    number_iterations_done = 0 # Number of iterations already accomplished, in case the chain is resuming from a previous run 