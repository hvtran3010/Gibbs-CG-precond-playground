    input_from_simulation = true # to perform the simulations of the input maps, foregrounds and noise ; if false, the input maps must be provided in path_input_maps

    ## Simulations
    
    # seed for foregrounds (if nedded) and noise simulations
    seed_realization_input = 42 # start seed for the noise realization, and possibly the PySM foreground components (when on-the-fly random contributions are added)
    
    # Input CMB
    # seed_realization_CMB = 42 # optional, seed for the CMB realization, otherwise taken as seed_realization_input 
    lmin_input_CMB = 2 # lmin for the input CMB power spectrum
    band_limit_input = false
    r_true = 1e-3 # input tensor-to-scalar ratio r for CMB simulation
    
    # Input foregrounds
    # define sky -- for simulation of input maps ; to be ignored if path_input_maps is provided 
